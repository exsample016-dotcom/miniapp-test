<!DOCTYPE html>
<html>
<head>

    <title>Telegram Mining</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <h1>🚀 TG MINING</h1>

    <div class="card">

        <h2 id="user">Guest</h2>

        <div class="stats">

            <div>
                <span>💰 Balance</span>
                <h3 id="balance">0</h3>
            </div>

            <div>
                <span>⚡ Power</span>
                <h3 id="power">1</h3>
            </div>

            <div>
                <span>🏆 Level</span>
                <h3 id="level">1</h3>
            </div>

        </div>

        <button onclick="mine()" id="mineBtn">
            ⛏ START MINING
        </button>

    </div>

    <div class="leaderboard">

        <h2>🏆 Leaderboard</h2>

        <div id="leaders"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
